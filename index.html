<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blake Canziani</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    /* Fixed header — taller (1.5×), nav riding low */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      height: 117px;
    }

    /* Big white logo box: ~1.5 tall × 2 wide, sharp, deep shadow */
    .logo-box {
      align-self: flex-start;
      margin-top: 8px;
      width: 168px;
      height: 126px;
      background: #fff;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 22px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    .logo-box img {
      height: 104px;
      width: auto;
      display: block;
    }

    /* Push nav links toward the bottom of the blue bar */
    nav {
      align-self: flex-end;
      margin-bottom: 10px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      padding: 8px 16px;
      font-size: 15px;
      margin-left: 8px;
      transition: background 0.3s;
      border-radius: 4px;
    }
    nav a:hover { background: rgba(255,255,255,0.2); }

    /* Pull the main column back from the page edge */
    main {
      max-width: 1300px;
      margin-left: 0;
      margin-right: auto;
      padding: 160px 24px 24px 90px;
    }

    .page-title {
      font-size: 2.8rem;
      margin: 8px 0 28px;
      color: #222;
    }

    /* Photo + Excerpt row — photo on the left, big excerpt on the right */
    .profile {
      display: flex;
      gap: 36px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .photo-card {
      flex: 0 0 auto;
      width: clamp(220px, 24vw, 320px);
    }
    .photo-card img {
      width: 100%;
      height: auto;
      object-fit: cover;
      object-position: center 20%;
      border-radius: 20px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      display: block;
    }
    .dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      background: #c5c5c5;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
    }
    .dot:hover { background: #888; }
    .dot.active { background: #444; transform: scale(1.2); }

    /* Bigger excerpt card */
    .excerpt {
      flex: 1;
      min-width: 320px;
      min-height: 300px;
      background: url('Blue_bar.jpg') no-repeat center center/cover;
      border-radius: 14px;
      padding: 40px 44px;
      color: #e2e2e2;
      font-size: 26px;
      line-height: 1.4;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.55);
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .excerpt p { margin: 0 0 12px; }
    .excerpt p:last-child { margin-bottom: 0; }

    /* Quote — centered on the page */
    .quote-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 56px 24px 60px;
    }
    .quote {
      max-width: 680px;
      text-align: center;
      font-style: italic;
      color: #444;
      margin: 0;
    }
    .quote p {
      font-size: 1.25rem;
      margin: 0 0 8px;
    }
    .quote cite {
      font-style: normal;
      color: #666;
    }

    @media (max-width: 768px) {
      .header-container { height: 84px; }
      .logo-box { width: 120px; height: 90px; margin-top: 6px; }
      .logo-box img { height: 72px; }
      nav { margin-bottom: 6px; }
      main { padding: 130px 16px 24px 20px; }
      .profile { flex-direction: column; align-items: stretch; }
      .photo-card { width: 100%; max-width: 320px; margin: 0 auto; }
      .page-title { font-size: 2rem; }
      .excerpt { font-size: 18px; padding: 24px 24px; min-height: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo-box">
        <img src="gator.png" alt="Gator logo" />
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="cv.html">CV</a>
        <a href="dissertation.html">Dissertation</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="page-title">Blake Canziani</h1>

    <section class="profile">
      <div class="photo-card">
        <img id="profile-photo" src="Blake_pic.jpg" alt="Photo of Blake Canziani" />
        <div class="dots">
          <button class="dot active" data-src="Blake_pic.jpg"   aria-label="Photo 1"></button>
          <button class="dot"        data-src="Blake_pic2.jpg"  aria-label="Photo 2"></button>
          <button class="dot"        data-src="Blake_pic3.jpg"  aria-label="Photo 3"></button>
        </div>
      </div>

      <div class="excerpt">
        <p>PhD Candidate</p>
        <p>University of Florida, Fisher School of Accounting</p>
        <p>Expected Graduation: May 2027</p>
      </div>
    </section>
  </main>

  <section class="quote-wrap">
    <blockquote class="quote">
      <p>"Quote text here."</p>
      <cite>— Person</cite>
    </blockquote>
  </section>

  <script>
    document.querySelectorAll('.dot').forEach(btn => {
      btn.addEventListener('click', () => {
        const photo = document.getElementById('profile-photo');
        photo.src = btn.dataset.src;
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</body>
</html>
