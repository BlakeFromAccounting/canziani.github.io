<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV – Blake Canziani</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Computer Modern Serif', 'Latin Modern Roman', Cambria, Georgia, serif;
      background: #f4f4f4;
      color: #333;
    }

    /* Top blue bar (fixed) */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      background: url('Blue_bar.jpg') no-repeat center center/cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      z-index: 1000;
      overflow: visible;
      border-bottom: 3px solid #FA4616;
    }
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      height: 117px;
    }
    .logo-box {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      /* removed: align-self, margin-top, width, height, background, border-radius, box-shadow */
    }
    .logo-box img {
      height: 95px;         /* tweak: 80–110 to taste — bar is 117px tall */
      width: auto;
      display: block;
    }
    nav {
      align-self: flex-end;
      margin-bottom: 10px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      padding: 8px 16px;
      font-size: 22px;
      margin-left: 8px;
      transition: background 0.3s;
      border-radius: 4px;
    }
    nav a:hover { background: rgba(255,255,255,0.2); }

    /* Page content */
    main {
      padding: 180px 24px 60px;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    .page-title {
      font-size: 3.4rem;
      margin: 0 0 24px;
      color: #222;
    }

    /* Scrollable CV embed */
    .cv-frame {
      width: 100%;
      height: 80vh;            /* 80% of the viewport height — adjust as you like */
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
    }
    .cv-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .cv-download {
      margin-top: 22px;
      font-size: 1.1rem;
    }
    .cv-download a {
      color: #0021A5;            /* UF blue */
      text-decoration: none;
      border-bottom: 1px solid #0021A5;
    }
    .cv-download a:hover { color: #FA4616; border-bottom-color: #FA4616; }

    @media (max-width: 768px) {
      .header-container { height: 84px; }
      .logo-box { /* nothing needed here anymore */ }
      .logo-box img { height: 60px; }
      nav { margin-bottom: 6px; }
      main { padding: 120px 16px 24px; }
      .page-title { font-size: 2rem; }
      .excerpt { font-size: 18px; padding: 24px 24px; min-height: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo-box">
        <img src="gator_logo_orange2.png" alt="Gator logo" />
      </div>
      <nav>
        <a href="index.html">About</a>
        <a href="CV.html">CV</a>
        <a href="Dissertation.html">Dissertation</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="page-title">Curriculum Vitae</h1>

    <div class="cv-frame">
      <iframe src="Webpage_CV.pdf#view=FitH" title="Blake Canziani CV"></iframe>
    </div>

    <p class="cv-download">
      <a href="Webpage_CV.pdf" download>Download CV (PDF)</a>
    </p>
  </main>
</body>
</html>
